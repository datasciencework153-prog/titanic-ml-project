<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Prediction</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;

            background: url("{{ url_for('static', filename='titanic.jpg') }}") no-repeat center center/cover;
            overflow: hidden;
        }

        /* 🌊 Waves */
        body::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 150px;
            background: url("https://i.imgur.com/Za7Xq5B.png") repeat-x;
            animation: wave 10s linear infinite;
            opacity: 0.6;
        }

        @keyframes wave {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* 🧊 Glass box */
        .container {
            width: 350px;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 12px;
            text-align: center;

            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(6px);

            position: relative;
            z-index: 10;

            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #2d5aa7;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: linear-gradient(45deg, #2d5aa7, #4facfe);
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* 📊 Result box */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 10px;
            animation: fadeIn 1s ease-in;
        }

        /* 🟢 SURVIVE */
        .survive {
            color: #00ff00;
            font-weight: bold;
            animation: blinkGreen 1s infinite;
        }

        /* 🔴 NOT SURVIVE */
        .not-survive {
            color: red;
            font-weight: bold;
            animation: blinkRed 1s infinite;
        }

        @keyframes blinkGreen {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        @keyframes blinkRed {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🚢 Titanic Survival Prediction</h2>

    <form action="/predict_form" method="POST">

        Pclass:<br>
        <input type="number" name="Pclass" required><br>

        Age:<br>
        <input type="number" name="Age" required><br>

        Fare:<br>
        <input type="number" name="Fare" required><br>

        Gender:<br>
        <select name="Sex_male">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select><br>

        Is Alone:<br>
        <select name="IsAlone">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select><br>

        Embarked S:<br>
        <input type="number" name="Embarked_S"><br>

        Embarked Q:<br>
        <input type="number" name="Embarked_Q"><br>

        <br>
        <button type="submit">Predict 🚀</button>

    </form>

    <!-- 📊 RESULT -->
    {% if result %}
    <div class="result-box">

        <h3>Result</h3>

        <p class="{% if 'SURVIVE' in result %}survive{% else %}not-survive{% endif %}">
            Passenger will: {{ result }}
        </p>

        <p>Probability: {{ probability }}%</p>

    </div>
    {% endif %}

</div>

</body>
</html>
